<!-- Deaf — Without Hearing -->
<!-- WCAG Spine disability icon: ear outline with outer sound arc, crossed by solid diagonal slash -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
     role="img" aria-labelledby="deaf-title deaf-desc">
  <title id="deaf-title">Deaf</title>
  <desc id="deaf-desc">An ear outline with a sound arc crossed by a solid diagonal slash indicating no hearing</desc>
  <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
        d="M13 9.5c0-1.7-1.3-3-3-3S7 7.8 7 9.5c0 1.4.8 2.6 2 3.2-.1.6-.3 1.1-.7 1.4-.4.4-.8 1.1-.8 1.9"/>
  <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
        d="M12.5 7A4.5 4.5 0 0 1 16.5 11"/>
  <path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M3.5 3.5L16.5 16.5"/>
</svg>
