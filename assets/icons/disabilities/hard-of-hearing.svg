<!-- Hard of Hearing — Limited Hearing -->
<!-- WCAG Spine disability icon: ear outline with a single faded short sound arc -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
     role="img" aria-labelledby="hoh-title hoh-desc">
  <title id="hoh-title">Hard of Hearing</title>
  <desc id="hoh-desc">An ear outline with a single faded sound arc indicating limited or reduced hearing</desc>
  <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
        d="M11.5 10c0-.8-.7-1.5-1.5-1.5S8.5 9.2 8.5 10c0 .7.4 1.3 1 1.6-.1.5-.2.9-.5 1.2-.4.4-.5.9-.5 1.7"/>
  <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
        opacity="0.5" d="M13 7.5A3.5 3.5 0 0 1 16 11"/>
</svg>
