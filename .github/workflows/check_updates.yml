name: Monthly Standards Update Check

on:
  schedule:
    # Run on the 1st of every month at 08:00 UTC
    - cron: "0 8 1 * *"
  workflow_dispatch: {}   # Allow manual triggering

permissions:
  contents: read
  issues: write

jobs:
  check-updates:
    name: Check for upstream standards updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update checker
        id: checker
        shell: bash
        run: |
          set +e
          python scripts/check_updates.py
          EXIT_CODE=$?
          echo "script_exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          # Exit code 1 means changes detected — handled gracefully below.
          # Exit code 2+ means a fatal error — propagate as a step failure.
          [ $EXIT_CODE -lt 2 ]

      - name: Create or update GitHub Issue on changes detected
        if: steps.checker.outputs.changes_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'update-report.md';
            const body = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : '*(Report file not found — check the workflow logs.)*';

            const runDate = '${{ steps.checker.outputs.report_date }}' || new Date().toISOString().slice(0, 10);
            const title = `Standards update detected \u2013 ${runDate}`;
            const labels = ['standards-update', 'automated'];

            // Check for an existing open issue to avoid duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: labels.join(','),
            });

            const existing = issues.find(i => i.title.startsWith('Standards update detected'));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `## Updated check \u2013 ${runDate}\n\n${body}`,
              });
              console.log(`Added comment to existing issue #${existing.number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
              console.log(`Created issue #${issue.number}: ${issue.html_url}`);
            }
